name: Trakt to Letterboxd Sync

# ──────────────────────────────────────────────────────────────────────────
#  CUÁNDO SE EJECUTA
# ──────────────────────────────────────────────────────────────────────────
on:
  # Cron: cada hora (simula tiempo real con ~1h de retraso máximo)
  # Formato: minuto hora día-mes mes día-semana
  # Consumo estimado: ~2 min × 24 ejecuciones/día = ~1,440 min/mes (OK en repo público, OK en privado)
  schedule:
    - cron: "0 * * * *"   # Cada hora en punto (ej: 09:00, 10:00, 11:00...)

  # Permite ejecutarlo manualmente desde la pestaña "Actions" de tu repo
  workflow_dispatch:
    inputs:
      hours_back:
        description: "Cuántas horas hacia atrás buscar en Trakt"
        required: false
        default: "24"
      headless:
        description: "Correr en modo headless (sin ventana visible)"
        required: false
        default: "true"

# ──────────────────────────────────────────────────────────────────────────
#  JOBS
# ──────────────────────────────────────────────────────────────────────────
jobs:
  sync:
    name: Sincronizar películas
    runs-on: ubuntu-22.04   # ubuntu-latest (24.04) rompe playwright 1.44 (libsound2)

    env:
      # Evita los warnings de deprecación de Node.js 20
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # 2. Configurar Python 3.11
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # cachea dependencias entre ejecuciones (más rápido)

      # 3. Instalar dependencias Python
      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      # 4. Preparar entorno para SeleniumBase (requiere Chrome virtual)
      - name: 🌐 Instalar Chrome virtual (Xvfb)
        run: sudo apt-get install -y xvfb

      # 5. Ejecutar el script de sincronización
      - name: 🎬 Ejecutar sincronización
        env:
          # ── Secrets configurados en tu repositorio ──
          # GitHub → Settings → Secrets and variables → Actions → New secret
          TRAKT_CLIENT_ID:   ${{ secrets.TRAKT_CLIENT_ID }}
          TRAKT_USERNAME:    ${{ secrets.TRAKT_USERNAME }}
          LETTERBOXD_USER:   ${{ secrets.LETTERBOXD_USER }}
          LETTERBOXD_PASS:   ${{ secrets.LETTERBOXD_PASS }}

          # Las nuevas cookies secretas
          LETTERBOXD_COOKIE_CSRF:   ${{ secrets.LETTERBOXD_COOKIE_CSRF }}
          LETTERBOXD_COOKIE_CURRENT:   ${{ secrets.LETTERBOXD_COOKIE_CURRENT }}

          # ── Variables opcionales ──
          HOURS_WINDOW: ${{ github.event.inputs.hours_back }}
          HEADLESS:     ${{ github.event.inputs.headless || 'true' }}
        # Xvfb crea una pantalla gráfica falsa para engañar a Cloudflare
        run: xvfb-run python sync.py

      # 6. Si falla, subir capturas de pantalla como artefacto para debug
      - name: 📸 Subir capturas de error
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: /tmp/letterboxd_*.png
          retention-days: 7
          if-no-files-found: ignore   # ← no falla si no hay capturas
